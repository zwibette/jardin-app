<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail variété — Jardin Vivant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a120b;--bg2:#0f1c10;--surface:#1a2e1c;--border:#2a4030;--border2:#3a5040;
  --text:#e8f5ea;--text-dim:#8fb898;--text-muted:#4a6b52;
  --green:#4ade80;--green-light:rgba(74,222,128,0.1);--green-mid:#22c55e;
  --amber:#fbbf24;--amber-light:rgba(251,191,36,0.1);
  --red:#f87171;--blue:#60a5fa;--blue-light:rgba(96,165,250,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(74,222,128,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(163,230,53,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

header{background:#0f1c10;border-bottom:1px solid var(--border);color:var(--text);padding:16px 20px;position:relative;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:6px;font-family:'Karla',sans-serif;font-size:.72rem;cursor:pointer;letter-spacing:.05em;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.header-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;margin-top:6px;color:var(--accent,#a3e635)}
.header-famille{font-size:.7rem;opacity:.7;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

main{max-width:900px;margin:0 auto;padding:20px 16px 40px;position:relative;z-index:1}

.stitle{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.section{margin-bottom:28px}

.total-banner{background:var(--surface);border:2px solid var(--green);color:var(--text);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.total-val{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:700;line-height:1}
.total-lbl{font-size:.7rem;opacity:.7;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.total-meta{display:flex;gap:20px;flex-wrap:wrap}
.tmeta{text-align:center}
.tmeta-val{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;display:block}
.tmeta-lbl{font-size:.62rem;opacity:.7;letter-spacing:.08em;text-transform:uppercase}

.lieux-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.lieu-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.lieu-icon{font-size:1.5rem;margin-bottom:6px}
.lieu-val{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:2px}
.lieu-val.serre{color:var(--blue)}.lieu-val.bacs{color:var(--amber)}.lieu-val.jardin{color:var(--green)}
.lieu-lbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.lieu-pct{font-size:.75rem;color:var(--text-muted);margin-top:4px}

.rendement-card{background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.rendement-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--green);line-height:1}
.rendement-lbl{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.rendement-detail{font-size:.72rem;color:var(--text-dim);margin-top:4px}
.rendement-missing{background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:14px 20px;margin-bottom:20px;font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:10px}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:560px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.chart-title{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:500}
.chart-wrap{position:relative;height:160px}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--green-light)}
td{padding:10px 12px;color:var(--text-dim)}
.stars{color:var(--amber);font-size:.75rem}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:500}
.badge-serre{background:var(--blue-light);color:var(--blue)}
.badge-bacs{background:var(--amber-light);color:var(--amber)}
.badge-jardin{background:var(--green-light);color:var(--green)}
.no-data{text-align:center;padding:60px 20px;color:var(--text-muted)}
.no-data div{font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;margin-bottom:8px;color:var(--text-dim)}

.edit-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 12px; }
.edit-field { display: flex; flex-direction: column; gap: 4px; }
.edit-field label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 500; }
.edit-field input, .edit-field select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: 'Karla', sans-serif; font-size: 0.82rem; width: 100%; box-sizing: border-box; }
.edit-field input:focus, .edit-field select:focus { border-color: var(--green); outline: none; }
.edit-btn-save { background: var(--green); color: var(--bg); border: none; padding: 8px 16px; border-radius: 6px; font-weight: 500; font-family: 'Karla', sans-serif; cursor: pointer; margin-top: 12px; width: 100%; transition: opacity 0.15s; font-size: 0.85rem; }
.edit-btn-save:hover { opacity: 0.9; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a href="/varietes.html" class="back-btn">← Toutes les variétés</a>
    <div id="saisonLabel" style="font-size:.65rem;opacity:.6;letter-spacing:.08em">SAISON 2025–2026</div>
  </div>
  <div class="header-title" id="txt-title">Chargement…</div>
  <div class="header-famille" id="txt-famille">—</div>
</header>

<main>
  <!-- PARAMÈTRES / CONFIGURATION DE LA VARIÉTÉ -->
  <div class="section">
    <div class="stitle">Paramètres de la variété</div>
    <div class="edit-panel">
      <div class="edit-grid">
        <div class="edit-field" style="grid-column: span 2;">
          <label>Note de performance (Étoiles)</label>
          <select id="param-note">
            <option value="5">⭐⭐⭐⭐⭐ Très productif & robuste</option>
            <option value="4">⭐⭐⭐⭐ Satisfaisant</option>
            <option value="3">⭐⭐⭐ Moyen / Standard</option>
            <option value="2">⭐⭐ Difficile / Faible rendement</option>
            <option value="1">⭐ À éviter</option>
          </select>
        </div>
        <div class="edit-field" style="grid-column: span 2;">
          <label>Persistance au jardin</label>
          <label style="display: flex; align-items: center; gap: 8px; background: var(--bg2); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: normal; font-size: 0.82rem; text-transform: none; letter-spacing: normal; color: var(--text);">
            <input type="checkbox" id="param-perpetuelle" style="width: auto; cursor: pointer;">
            <span>✨ Définir comme culture perpétuelle</span>
          </label>
        </div>
      </div>
      <button class="edit-btn-save" onclick="sauverParametresVariete()">💾 Enregistrer les paramètres</button>
    </div>
  </div>

  <!-- BANNIÈRE DE RENDEMENT GLOBAL -->
  <div class="total-banner">
    <div>
      <div class="total-val" id="lbl-total-poids">0,00 <span style="font-size:1.5rem">kg</span></div>
      <div class="total-lbl">récoltés au total</div>
    </div>
    <div class="total-meta">
      <div class="tmeta"><span class="tmeta-val" id="lbl-nb-recoltes">0</span><span class="tmeta-lbl">apports</span></div>
      <div class="tmeta"><span class="tmeta-val" id="lbl-nb-plants">0</span><span class="tmeta-lbl">plants actifs</span></div>
    </div>
  </div>

  <!-- RENDEMENT PAR LIEU -->
  <div class="lieux-grid" id="lieuxContainer"></div>

  <!-- RENDEMENT MOYEN PAR PLANT -->
  <div id="rendementContainer"></div>

  <!-- GRAPHIQUES -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Répartition par Lieu</div>
      <div class="chart-wrap"><canvas id="chartLieu"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Évolution des récoltes</div>
      <div class="chart-wrap"><canvas id="chartEvol"></canvas></div>
    </div>
  </div>

  <!-- HISTORIQUE DES APPORTS -->
  <div class="section">
    <div class="stitle">Historique détaillé des apports</div>
    <div id="tableContainer"></div>
  </div>
</main>

<script>
// Lecture ultra-robuste des paramètres de l'URL
const urlQuery = window.location.search;
const params = new URLSearchParams(urlQuery);

// Récupération des formats courants d'URLs (?id=123, ?nom=Tomate, ou directement ?Tomate)
const varieteId = parseInt(params.get('id')) || 0;
const varieteNomParam = params.get('nom') ? params.get('nom').trim() : null;
const urlBruteDecodee = decodeURIComponent(urlQuery.substring(1)).trim();

let currentVariete = null;
let recoltesMatch = [];
let culturesMatch = [];
let saisonActive = "2025-2026";
let storageKeyUtilisee = "varietes"; // Clé historique par défaut

function fmtKg(v) { return v.toFixed(2).replace('.', ',') + ' kg'; }

function initPage() {
  // Synchronisation de la saison active
  const storedSaison = localStorage.getItem('saison_active');
  if(storedSaison) saisonActive = storedSaison;
  document.getElementById('saisonLabel').innerText = `SAISON ${saisonActive.replace('-', '–')}`;

  // Analyse et récupération adaptative de la liste des variétés du LocalStorage
  let listV = [];
  if (localStorage.getItem('varietes')) {
    listV = JSON.parse(localStorage.getItem('varietes') || '[]');
    storageKeyUtilisee = "varietes";
  } else if (localStorage.getItem('varietes_globales')) {
    listV = JSON.parse(localStorage.getItem('varietes_globales') || '[]');
    storageKeyUtilisee = "varietes_globales";
  }

  // STRATÉGIE DE RECHERCHE DE LA VARIÉTÉ DANS VOTRE BASE
  // 1. Recherche par ID numérique
  if (varieteId > 0) {
    currentVariete = listV.find(v => v.id === varieteId);
  }
  // 2. Recherche par paramètre 'nom' précis (?nom=...)
  if (!currentVariete && varieteNomParam) {
    currentVariete = listV.find(v => v.nom.toLowerCase() === varieteNomParam.toLowerCase());
  }
  // 3. Recherche sur l'URL brute complète (cas des liens simplifiés : ?Nom%20Du%20Legume)
  if (!currentVariete && urlBruteDecodee && !urlBruteDecodee.includes('=')) {
    currentVariete = listV.find(v => v.nom.toLowerCase() === urlBruteDecodee.toLowerCase() || v.id == urlBruteDecodee);
  }
  // 4. Recherche par approximation textuelle sur l'ID brut transmis
  if (!currentVariete && params.get('id')) {
    const fallbackIdStr = params.get('id').toLowerCase();
    currentVariete = listV.find(v => v.nom.toLowerCase().includes(fallbackIdStr));
  }

  // SI LA VARIÉTÉ N'EXISTE PAS DANS LA LISTE FIXE :
  // On extrait dynamiquement son nom depuis l'URL pour lui créer une fiche à la volée
  if(!currentVariete) {
    let nomExtrait = "Variété Inconnue";
    if (varieteNomParam) nomExtrait = varieteNomParam;
    else if (urlBruteDecodee && !urlBruteDecodee.includes('=')) nomExtrait = urlBruteDecodee;
    else if (params.get('id') && isNaN(params.get('id'))) nomExtrait = params.get('id');

    currentVariete = {
      id: varieteId || Date.now(),
      nom: nomExtrait,
      famille: "LÉGUME",
      note: "3",
      perpetuelle: false
    };
  }

  // Remplissage de l'interface graphique
  document.getElementById('txt-title').innerText = currentVariete.nom;
  document.getElementById('txt-famille').innerText = currentVariete.famille || 'LÉGUME';
  document.getElementById('param-note').value = currentVariete.note || "3";
  document.getElementById('param-perpetuelle').checked = currentVariete.perpetuelle || false;

  // EXTRACTION DES APPORTS (RÉCOLTES) LIÉS À CETTE VARIÉTÉ
  const allRecoltes = JSON.parse(localStorage.getItem('recoltes_jardin') || '[]');
  recoltesMatch = allRecoltes.filter(r => {
    if (!r.variete) return false;
    return r.varieteId === currentVariete.id || r.variete.toLowerCase() === currentVariete.nom.toLowerCase();
  });

  // EXTRACTION DES PLANIFICATIONS DANS LE CALENDRIER
  const allCultures = JSON.parse(localStorage.getItem('cultures_planifiees') || '[]');
  culturesMatch = allCultures.filter(c => {
    if (!c.culture) return false;
    return c.culture.toLowerCase().includes(currentVariete.nom.toLowerCase());
  });

  // Lancement des calculs statistiques et graphiques
  calculerStatsEtRendus();
}

function sauverParametresVariete() {
  if(!currentVariete) return;

  const noteSelectionnee = document.getElementById('param-note').value;
  const estPerpetuelle = document.getElementById('param-perpetuelle').checked;

  let listV = JSON.parse(localStorage.getItem(storageKeyUtilisee) || '[]');
  let idx = listV.findIndex(v => v.id === currentVariete.id || v.nom.toLowerCase() === currentVariete.nom.toLowerCase());
  
  if(idx === -1) {
    currentVariete.note = noteSelectionnee;
    currentVariete.perpetuelle = estPerpetuelle;
    listV.push(currentVariete);
  } else {
    listV[idx].note = noteSelectionnee;
    listV[idx].perpetuelle = estPerpetuelle;
  }

  localStorage.setItem(storageKeyUtilisee, JSON.stringify(listV));
  
  // Propagation automatique de la "culture perpétuelle" vers l'échéancier/calendrier
  let allCultures = JSON.parse(localStorage.getItem('cultures_planifiees') || '[]');
  let modificationsCultures = false;
  allCultures.forEach(c => {
    if(c.culture && c.culture.toLowerCase().includes(currentVariete.nom.toLowerCase())) {
      c.perpetuelle = estPerpetuelle;
      modificationsCultures = true;
    }
  });
  if(modificationsCultures) {
    localStorage.setItem('cultures_planifiees', JSON.stringify(allCultures));
  }

  alert("✨ Paramètres et persistance enregistrés avec succès !");
}

function calculerStatsEtRendus() {
  let totalPoids = 0;
  let plantsActifs = 0;
  let distributionLieu = { serre: 0, bacs: 0, jardin: 0 };

  recoltesMatch.forEach(r => {
    const p = parseFloat(r.poids) || 0;
    totalPoids += p;
    if(distributionLieu[r.lieu] !== undefined) {
      distributionLieu[r.lieu] += p;
    }
  });

  culturesMatch.forEach(c => {
    if(c.saison === saisonActive) plantsActifs += parseInt(c.plants) || 0;
  });

  document.getElementById('lbl-total-poids').innerHTML = `${totalPoids.toFixed(2).replace('.', ',')} <span style="font-size:1.5rem">kg</span>`;
  document.getElementById('lbl-nb-recoltes').innerText = recoltesMatch.length;
  document.getElementById('lbl-nb-plants').innerText = plantsActifs;

  // Cartes par Emplacement
  const lieuxContainer = document.getElementById('lieuxContainer');
  const icons = { serre: "🏠", bacs: "🪴", jardin: "🌳" };
  const labels = { serre: "Serre", bacs: "Bacs", jardin: "Jardin" };
  
  let htmlLieux = '';
  for(let key in distributionLieu) {
    let p = distributionLieu[key];
    let pct = totalPoids > 0 ? ((p / totalPoids) * 100).toFixed(0) : 0;
    htmlLieux += `
    <div class="lieu-card">
      <div class="lieu-icon">${icons[key]}</div>
      <div class="lieu-val ${key}">${p.toFixed(1).replace('.', ',')} kg</div>
      <div class="lieu-lbl">${labels[key]}</div>
      <div class="lieu-pct">${pct}% du total</div>
    </div>`;
  }
  lieuxContainer.innerHTML = htmlLieux;

  // Calcul rendement par pied
  const rendContainer = document.getElementById('rendementContainer');
  if(plantsActifs > 0) {
    let moy = totalPoids / plantsActActive = totalPoids / plantsActifs;
    rendContainer.innerHTML = `
    <div class="rendement-card">
      <div>
        <div class="rendement-val">${(totalPoids / plantsActifs).toFixed(2).replace('.', ',')} kg / plant</div>
        <div class="rendement-lbl">Rendement moyen calculé</div>
        <div class="rendement-detail">Basé sur ${plantsActifs} plants actifs cette saison.</div>
      </div>
    </div>`;
  } else {
    rendContainer.innerHTML = `
    <div class="rendement-missing">
      ℹ️ Aucun plant enregistré ou planifié comme actif sur cette saison (${saisonActive}) pour évaluer le rendement moyen unitaire.
    </div>`;
  }

  // Historique des pesées
  const tableContainer = document.getElementById('tableContainer');
  if(recoltesMatch.length === 0) {
    tableContainer.innerHTML = `
    <div class="no-data">
      <div>Aucune récolte déclarée</div>
      Rien n'a été pesé ou enregistré pour le moment concernant cette variété.
    </div>`;
  } else {
    let rows = '';
    const sorted = [...recoltesMatch].sort((a,b) => b.date.localeCompare(a.date));
    sorted.forEach(r => {
      rows += `
      <tr>
        <td>${r.date.split('-').reverse().join('/')}</td>
        <td><span class="badge badge-${r.lieu}">${icons[r.lieu]} ${r.lieu.toUpperCase()}</span></td>
        <td style="font-weight:500; color:var(--text);">${fmtKg(r.poids)}</td>
        <td style="font-size:.75rem; font-style:italic;">${r.remarque || '—'}</td>
      </tr>`;
    });

    tableContainer.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Emplacement</th>
            <th>Poids récolté</th>
            <th>Note / Remarque</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  renderCharts(distributionLieu);
}

function renderCharts(distLieu) {
  const ctxLieu = document.getElementById('chartLieu').getContext('2d');
  new Chart(ctxLieu, {
    type: 'doughnut',
    data: {
      labels: ['Serre', 'Bacs', 'Jardin'],
      datasets: [{
        data: [distLieu.serre, distLieu.bacs, distLieu.jardin],
        backgroundColor: ['#60a5fa', '#fbbf24', '#4ade80'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#8fb898', font: { size: 10 } } } }
    }
  });

  const ctxEvol = document.getElementById('chartEvol').getContext('2d');
  if(recoltesMatch.length === 0) return;
  
  const chronoData = [...recoltesMatch].sort((a,b) => a.date.localeCompare(b.date));
  let labels = chronoData.map(r => r.date.split('-').slice(1).reverse().join('/'));
  let cumulativeWeights = [];
  let sum = 0;
  chronoData.forEach(r => {
    sum += parseFloat(r.poids) || 0;
    cumulativeWeights.push(sum);
  });

  new Chart(ctxEvol, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Cumulé (kg)',
        data: cumulativeWeights,
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74,222,128,0.1)',
        fill: true,
        tension: 0.2,
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#4a6b52', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#4a6b52', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,.04)' } }
      }
    }
  });
}

window.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
