<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail variété — Jardin Vivant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a120b;--bg2:#0f1c10;--surface:#1a2e1c;--border:#2a4030;--border2:#3a5040;
  --text:#e8f5ea;--text-dim:#8fb898;--text-muted:#4a6b52;
  --green:#4ade80;--green-light:rgba(74,222,128,0.1);--green-mid:#22c55e;
  --amber:#fbbf24;--amber-light:rgba(251,191,36,0.1);
  --red:#f87171;--blue:#60a5fa;--blue-light:rgba(96,165,250,0.1);
}
body {
  font-family:'Karla',sans-serif; background:var(--bg); color:var(--text);
  margin:0; padding:16px; box-sizing:border-box; -webkit-font-smoothing:antialiased;
}
.header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
  position:relative; border-bottom:1px solid var(--border); padding-bottom:12px;
}
.btn-back {
  background:none; border:1px solid var(--border); color:var(--text-dim);
  padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.85rem;
  transition:all 0.2s; text-decoration:none; display:inline-block;
}
.btn-back:hover { border-color:var(--text-dim); color:var(--text); }
h1 {
  font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700;
  margin:0; text-align:center; flex-grow:1; color:var(--text);
}
.grid {
  display:grid; grid-template-columns:1fr; gap:16px; margin-bottom:16px;
}
@media(min-width:768px) { .grid { grid-template-columns:1fr 1fr; } }
.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px;
}
.card h2 {
  font-family:'Playfair Display',serif; font-size:1.1rem; margin-top:0; margin-bottom:12px;
  color:var(--text-dim); border-bottom:1px solid var(--border); padding-bottom:6px;
}
.stats-mini {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; text-align:center; margin-bottom:12px;
}
.stat-box { background:var(--surface); padding:8px; border-radius:4px; border:1px solid var(--border); }
.stat-box .val { font-size:1.1rem; font-weight:500; color:var(--green); }
.stat-box .lbl { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; margin-top:2px; }
.card-meta { display:flex; flex-direction:column; gap:8px; }
.meta-item {
  display:flex; justify-content:space-between; font-size:0.85rem; padding:6px 8px;
  background:var(--surface); border-radius:4px; border:1px solid var(--border);
}
.meta-item span:first-child { color:var(--text-dim); }
.meta-item span:last-child { font-weight:500; color:var(--text); }
.chart-container { position:relative; height:160px; width:100%; }
.table-wrap { overflow-x:auto; margin-top:16px; }
table { width:100%; border-collapse:collapse; text-align:left; font-size:0.85rem; }
th { color:var(--text-muted); font-weight:500; padding:8px; border-bottom:1px solid var(--border); font-size:0.75rem; text-transform:uppercase; }
td { padding:8px; border-bottom:1px solid var(--border); color:var(--text-dim); }
tr:hover td { color:var(--text); background:rgba(255,255,255,0.01); }
.badge {
  padding:2px 6px; border-radius:3px; font-size:0.75rem; font-weight:500; display:inline-block;
}
.badge-serre { background:var(--blue-light); color:var(--blue); border:1px solid rgba(96,165,250,0.2); }
.badge-bacs { background:var(--amber-light); color:var(--amber); border:1px solid rgba(251,191,36,0.2); }
.badge-exterieur { background:var(--green-light); color:var(--green); border:1px solid rgba(74,222,128,0.2); }
select { font-family:'Karla', sans-serif; cursor: pointer; }
input[type="date"] { cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <a href="recoltes.html" class="btn-back">← Retour</a>
  <h1 id="title">Variété</h1>
  <div style="width:72px;"></div>
</div>

<div class="grid">
  <div class="card">
    <h2>📊 Vue d'ensemble</h2>
    <div class="stats-mini">
      <div class="stat-box"><div class="val" id="stTotal">—</div><div class="lbl">Total Récolté</div></div>
      <div class="stat-box"><div class="val" id="stPassages">—</div><div class="lbl">Passages</div></div>
      <div class="stat-box"><div class="val" id="stMoyenne">—</div><div class="lbl">Moy / Récolte</div></div>
    </div>
    <div class="card-meta" id="metaContainer"></div>

    <div style="background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 6px; margin-top: 14px;">
      <h3 style="font-family: 'Playfair Display', serif; color: var(--text-dim); margin-top: 0; margin-bottom: 12px; font-size: 1rem;">🛠️ Paramètres de culture</h3>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
        <div>
          <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Nom de la culture</label>
          <input type="text" id="edit-nom" style="width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:7px; border-radius:4px; font-size:0.85rem; box-sizing:border-box;">
        </div>
        <div>
          <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Lieu de culture</label>
          <select id="edit-lieu" style="width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:7px; border-radius:4px; font-size:0.85rem; box-sizing:border-box;">
            <option value="jardin">🏡 Jardin (Extérieur)</option>
            <option value="serre">☀️ Serre</option>
            <option value="bacs">📦 Bac surélevé</option>
          </select>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 12px;">
        <div>
          <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Date de Semis</label>
          <input type="date" id="edit-semis" style="width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:6px; border-radius:4px; font-size:0.8rem; box-sizing:border-box;">
        </div>
        <div>
          <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Date de Plantation</label>
          <input type="date" id="edit-plant" style="width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:6px; border-radius:4px; font-size:0.8rem; box-sizing:border-box;">
        </div>
        <div>
          <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Nombre de plants</label>
          <input type="number" id="edit-nbr" min="0" style="width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:6px; border-radius:4px; font-size:0.8rem; box-sizing:border-box;">
        </div>
      </div>
      <button onclick="saveCultureParams()" style="background: var(--green-mid); color: #0a120b; border: none; padding: 8px 12px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 0.85rem; width: 100%;">
        💾 Enregistrer les modifications
      </button>
      <div id="save-status" style="font-size: 0.75rem; margin-top: 6px; text-align: center; display: none;"></div>
    </div>
  </div>

  <div class="card">
    <h2>📍 Répartition par Lieu</h2>
    <div class="chart-container">
      <canvas id="chartLieu"></canvas>
    </div>
  </div>
</div>

<div class="card" style="margin-bottom:16px;">
  <h2>📈 Évolution temporelle</h2>
  <div class="chart-container" style="height:180px;">
    <canvas id="chartEvol"></canvas>
  </div>
</div>

<div class="card">
  <h2>📋 Historique des passages</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Date</th><th>Lieu</th><th>Emplacement</th><th>Poids</th><th>Note</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const vegetal = params.get('v') || '';

const RECOLTES_BRUTES = (window.opener && window.opener.RECOLTES_INITIALES) ? window.opener.RECOLTES_INITIALES : [];

function fmtKg(g) {
  if(g >= 1000) return (g/1000).toFixed(2) + ' kg';
  return g + ' g';
}

function analyzeData() {
  const filtered = RECOLTES_BRUTES.filter(r => r.vegetal === vegetal);
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
  let totalPoids = 0;
  const lieuxMap = {};
  filtered.forEach(r => {
    totalPoids += r.poids;
    lieuxMap[r.lieu] = (lieuxMap[r.lieu] || 0) + r.poids;
  });
  return { filtered, sorted, totalPoids, lieuxMap };
}

function renderMeta(sorted) {
  const container = document.getElementById('metaContainer');
  container.innerHTML = '';
  if(!sorted.length) return;
  const emps = Array.from(new Set(sorted.map(r => r.emplacement).filter(Boolean)));
  if(emps.length) {
    const d = document.createElement('div'); d.className = 'meta-item';
    d.innerHTML = `<span>Emplacement(s)</span><span>${emps.join(', ')}</span>`;
    container.appendChild(d);
  }
  const dates = sorted.map(r => r.date).sort();
  const d1 = dates[0].split('-').reverse().join('/');
  const d2 = dates[dates.length-1].split('-').reverse().join('/');
  
  let div = document.createElement('div'); div.className = 'meta-item';
  div.innerHTML = `<span>Première récolte</span><span>${d1}</span>`;
  container.appendChild(div);
  
  div = document.createElement('div'); div.className = 'meta-item';
  div.innerHTML = `<span>Dernière récolte</span><span>${d2}</span>`;
  container.appendChild(div);
}

function renderChartLieu(lieuxMap) {
  const ctx = document.getElementById('chartLieu').getContext('2d');
  const labels = Object.keys(lieuxMap);
  if(!labels.length) return;
  const colors = labels.map(l => l==='serre'?'#60a5fa':l==='bacs'?'#fbbf24':'#4ade80');
  new Chart(ctx, {
    type:'doughnut',
    data:{
      labels:labels.map(l=>l.toUpperCase()),
      datasets:[{ data:Object.values(lieuxMap), backgroundColor:colors, borderWidth:0 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{ legend:{position:'right',labels:{color:'#e8f5ea',font:{size:11}}},
        tooltip:{callbacks:{label:c=>' '+fmtKg(c.parsed)}} } }
  });
}

function renderChartEvolution(sorted) {
  if(!sorted.length) return;
  const lieux = Array.from(new Set(sorted.map(r=>r.lieu)));
  const dates = Array.from(new Set(sorted.map(r=>r.date))).sort();
  
  if(lieux.length > 1) {
    const configLieux = { serre:{label:'Serre',color:'#60a5fa'}, bacs:{label:'Bacs',color:'#fbbf24'}, exterieur:{label:'Extérieur',color:'#4ade80'} };
    const datasets = lieux.map(l => {
      const lc = configLieux[l] || {label:l,color:'#9e9488'};
      let cumul = 0;
      const data = dates.map(d => {
        const rDuJour = sorted.filter(r => r.date === d && r.lieu === l);
        cumul += rDuJour.reduce((acc,curr) => acc+curr.poids, 0);
        return cumul > 0 ? cumul : null;
      });
      if(!data.some(v=>v!==null)) return null;
      return { label:lc.label, data, borderColor:lc.color, backgroundColor:lc.color+'20', borderWidth:2, pointRadius:4, pointBackgroundColor:lc.color, fill:false, tension:0.3, spanGaps:true };
    }).filter(Boolean);
    
    new Chart(document.getElementById('chartEvol').getContext('2d'), {
      type:'line',
      data:{ labels:dates.map(d=>{const[,m,j]=d.split('-');return j+'/'+m;}), datasets },
      options:{ responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{position:'bottom',labels:{color:'#8fb898',font:{size:10}}},
          tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtKg(c.parsed.y)}}},
        scales:{x:{ticks:{color:'#8fb898',font:{size:9}},grid:{display:false}},
          y:{ticks:{color:'#8fb898',font:{size:9},callback:v=>fmtKg(v)},grid:{color:'#2a4030'}}} }
    });
  } else {
    new Chart(document.getElementById('chartEvol').getContext('2d'), {
      type:'bar',
      data:{ labels:sorted.map(r=>{const[,m,j]=r.date.split('-');return j+'/'+m;}),
        datasets:[{data:sorted.map(r=>r.poids), backgroundColor:lieux[0]==='serre'?'#60a5fa':lieux[0]==='bacs'?'#fbbf24':'#4ade80', borderRadius:4}] },
      options:{ responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtKg(c.parsed.y)}}},
        scales:{x:{ticks:{color:'#8fb898',font:{size:9}},grid:{display:false}},
          y:{ticks:{color:'#8fb898',font:{size:9},callback:v=>fmtKg(v)},grid:{color:'#2a4030'}}} }
    });
  }
}

// ── LOGIQUE AVANCÉE DE RECHERCHE, CONFIGURATION ET FUSION ──
function loadCultureParams() {
  document.getElementById('edit-nom').value = vegetal;

  try {
    const calendarData = JSON.parse(localStorage.getItem('jardin_calendrier_v1') || '{}');
    let foundItem = null;
    
    for (const key in calendarData) {
      if (key.toLowerCase().trim() === vegetal.toLowerCase().trim()) {
        foundItem = calendarData[key];
        window.calendarItemKey = key;
        break;
      }
    }
    if (!foundItem) {
      for (const key in calendarData) {
        if (key.toLowerCase().includes(vegetal.toLowerCase()) || vegetal.toLowerCase().includes(key.toLowerCase())) {
          foundItem = calendarData[key];
          window.calendarItemKey = key;
          break;
        }
      }
    }

    if (foundItem) {
      if (foundItem.semis) document.getElementById('edit-semis').value = foundItem.semis;
      if (foundItem.plantation) document.getElementById('edit-plant').value = foundItem.plantation;
      if (foundItem.nbrPlants) document.getElementById('edit-nbr').value = foundItem.nbrPlants;
      if (foundItem.lieu) document.getElementById('edit-lieu').value = foundItem.lieu;
    }
  } catch (e) {
    console.error("Erreur de chargement :", e);
  }
}

function saveCultureParams() {
  const statusDiv = document.getElementById('save-status');
  const nouveauNom = document.getElementById('edit-nom').value.trim();

  if (!nouveauNom) {
    statusDiv.style.color = "var(--red)";
    statusDiv.textContent = "⚠️ Le nom ne peut pas être vide.";
    statusDiv.style.display = "block";
    return;
  }

  try {
    const calendarData = JSON.parse(localStorage.getItem('jardin_calendrier_v1') || '{}');
    const ancienneCle = window.calendarItemKey || vegetal;
    
    // 1. Collecter les données saisies dans les champs
    const dateSemis = document.getElementById('edit-semis').value || null;
    const datePlant = document.getElementById('edit-plant').value || null;
    const lieuChoisi = document.getElementById('edit-lieu').value || 'jardin';
    const inputPlants = parseInt(document.getElementById('edit-nbr').value, 10);
    const nbrPlants = isNaN(inputPlants) ? null : inputPlants;

    let destinationObj = {};

    // 2. LOGIQUE DE FUSION : Si la cible existe déjà (changement de nom vers un nom existant)
    if (ancienneCle !== nouveauNom && calendarData[nouveauNom]) {
      const existingObj = calendarData[nouveauNom];
      
      // Fusion des dates (on prend la saisie, sinon la date existante)
      destinationObj.semis = dateSemis || existingObj.semis || null;
      destinationObj.plantation = datePlant || existingObj.plantation || null;
      destinationObj.lieu = lieuChoisi || existingObj.lieu || 'jardin';
      
      // Somme cumulative des nombres de plants
      const anciensPlants = parseInt(existingObj.nbrPlants, 10) || 0;
      const nouveauxPlants = nbrPlants || 0;
      destinationObj.nbrPlants = (anciensPlants + nouveauxPlants) || null;
      
      statusDiv.textContent = "🔄 Fusion avec la culture existante...";
    } else {
      // Cas classique de mise à jour simple ou création de clé
      destinationObj.semis = dateSemis;
      destinationObj.plantation = datePlant;
      destinationObj.lieu = lieuChoisi;
      destinationObj.nbrPlants = nbrPlants;
      statusDiv.textContent = "✓ Modifications enregistrées avec succès !";
    }

    // Si le nom a changé, on nettoie proprement l'ancienne clé
    if (ancienneCle !== nouveauNom) {
      delete calendarData[ancienneCle];
    }
    
    // Injecter l'objet fusionné ou mis à jour
    calendarData[nouveauNom] = destinationObj;

    // Sauvegarde dans le localStorage global
    localStorage.setItem('jardin_calendrier_v1', JSON.stringify(calendarData));
    
    statusDiv.style.color = "var(--green)";
    statusDiv.style.display = "block";
    
    setTimeout(() => {
      statusDiv.style.display = "none";
      if (vegetal !== nouveauNom) {
        window.location.search = `?v=${encodeURIComponent(nouveauNom)}`;
      } else {
        location.reload();
      }
    }, 1200);

  } catch (e) {
    statusDiv.style.color = "var(--red)";
    statusDiv.textContent = "⚠️ Erreur lors de la sauvegarde.";
    statusDiv.style.display = "block";
    console.error(e);
  }
}

function init() {
  if(!vegetal) {
    document.body.innerHTML = '<div style="padding:20px;color:var(--text-dim)">Aucune variété spécifiée.</div>';
    return;
  }
  document.getElementById('title').textContent = vegetal;
  
  const { filtered, sorted, totalPoids, lieuxMap } = analyzeData();
  
  document.getElementById('stTotal').textContent = fmtKg(totalPoids);
  document.getElementById('stPassages').textContent = filtered.length;
  const moy = filtered.length ? Math.round(totalPoids / filtered.length) : 0;
  document.getElementById('stMoyenne').textContent = fmtKg(moy);
  
  renderMeta(sorted);
  renderChartLieu(lieuxMap);
  renderChartEvolution(sorted);
  
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  if(!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Aucun passage enregistré</td></tr>';
  } else {
    sorted.forEach(r => {
      const tr = document.createElement('tr');
      const dStr = r.date.split('-').reverse().join('/');
      const bc = r.lieu === 'serre' ? 'badge-serre' : r.lieu === 'bacs' ? 'badge-bacs' : 'badge-exterieur';
      tr.innerHTML = `
        <td>${dStr}</td>
        <td><span class="badge ${bc}">${r.lieu}</span></td>
        <td>${r.emplacement || '—'}</td>
        <td style="font-weight:500;color:var(--text);">${fmtKg(r.poids)}</td>
        <td style="font-style:italic;font-size:0.8rem;color:var(--text-muted);">${r.note || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }
  
  loadCultureParams();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
