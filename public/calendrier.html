<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier — Jardin Vivant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a120b;--bg2:#0f1c10;--surface:#1a2e1c;--border:#2a4030;--border2:#3a5040;
  --text:#e8f5ea;--text-dim:#8fb898;--text-muted:#4a6b52;
  --green:#4ade80;--green-light:rgba(74,222,128,0.1);--green-mid:#22c55e;
  --amber:#fbbf24;--amber-light:rgba(251,191,36,0.1);
  --red:#f87171;--red-light:rgba(248,113,113,0.1);
  --blue:#60a5fa;--blue-light:rgba(96,165,250,0.1);
  --accent:#a3e635;
  --semis:#60a5fa;--plantation:#a3e635;--recolte:#4ade80;--recolte-reel:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(74,222,128,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(163,230,53,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

header{background:#0f1c10;border-bottom:1px solid var(--border);padding:20px 20px 16px;position:relative;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.back-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:6px;font-family:'Karla',sans-serif;font-size:.72rem;cursor:pointer;letter-spacing:.05em;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.header-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;letter-spacing:.01em}
.header-sub{font-size:.72rem;opacity:.7;letter-spacing:.05em}
.header-stats{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;display:block;line-height:1}
.hstat-lbl{font-size:.62rem;opacity:.7;letter-spacing:.08em;text-transform:uppercase}

main{max-width:1100px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

.stitle{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.section{margin-bottom:28px}

/* LÉGENDE */
.legende{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:.7rem;color:var(--text-muted)}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* TIMELINE CALENDRIER */
/* #11: min-width pour que les 12 mois soient tous visibles */
.cal-container{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow-x:auto;overflow-y:visible;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.cal-header{display:grid;grid-template-columns:150px repeat(12,minmax(52px,1fr));border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5;min-width:800px}
.cal-header-culture{padding:10px 12px;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500;border-right:1px solid var(--border)}
.cal-header-month{padding:8px 2px;font-size:.62rem;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);text-align:center;border-right:1px solid rgba(42,64,48,.4);white-space:nowrap}
.cal-header-month.current{color:var(--accent);font-weight:700}
.cal-row{display:grid;grid-template-columns:150px repeat(12,minmax(52px,1fr));border-bottom:1px solid rgba(42,64,48,.3);transition:background .15s;min-height:40px;min-width:800px}
.cal-row:last-child{border-bottom:none}
.cal-row:hover{background:rgba(74,222,128,.04)}
.cal-row.section-header{background:var(--bg2);min-height:28px}
.cal-culture{padding:8px 10px;font-size:.72rem;color:var(--text);font-weight:500;border-right:1px solid var(--border);display:flex;align-items:center;gap:4px;cursor:pointer;line-height:1.3}
.cal-culture:hover .culture-name{color:var(--green)}
/* #10: soulignement pointillé dans le calendrier */
.culture-name{flex:1;text-decoration:underline dotted;text-underline-offset:3px;text-decoration-color:rgba(74,222,128,.4)}
.cal-section-label{padding:6px 12px;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:700;grid-column:1/-1;display:flex;align-items:center;gap:8px}
.cal-cell{position:relative;border-right:1px solid rgba(42,64,48,.2);display:flex;align-items:center;padding:3px 2px}
.cal-cell.current-month{background:rgba(163,230,53,.04)}

/* BARRES */
.bar{height:14px;border-radius:4px;position:absolute;min-width:4px;opacity:.85;transition:opacity .2s}
.bar:hover{opacity:1}
.bar-semis{background:var(--semis)}
.bar-plantation{background:var(--plantation)}
.bar-recolte-prev{background:var(--recolte);opacity:.4;border:1px dashed var(--recolte)}
.bar-recolte-reel{background:var(--recolte-reel);opacity:.9}
.bar-tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#0f1c10;border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:.65rem;color:var(--text);white-space:nowrap;z-index:20;pointer-events:none;display:none}
.bar:hover .bar-tooltip{display:block}

/* SAISIE */
.saisie-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.saisie-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500}
.field input,.field select{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-family:'Karla',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(61,122,79,.12)}
.field-full{grid-column:1/-1}
.add-btn{background:var(--green-mid);color:#0a120b;border:none;border-radius:8px;padding:11px 20px;font-family:'Karla',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;width:100%;letter-spacing:.03em;transition:all .2s}
.add-btn:hover{background:var(--green)}

/* TABS */
.tab-nav{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);padding:3px;border-radius:8px;border:1px solid var(--border)}
.tnav{flex:1;padding:7px 6px;border:none;background:transparent;color:var(--text-muted);font-family:'Karla',sans-serif;font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .2s;font-weight:500}
.tnav.active{background:var(--bg);color:var(--accent);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tab-section{display:none}.tab-section.active{display:block}

/* DELETE BTN */
.del-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem;padding:2px 4px;border-radius:4px;line-height:1;transition:color .2s}
.del-btn:hover{color:var(--red)}
.th-sort{cursor:pointer;user-select:none;white-space:nowrap}
.th-sort:hover{color:var(--green)}
.th-sort.active{color:var(--accent)}
.sort-arrow{margin-left:4px;font-size:.6rem;opacity:.6}
.th-sort.active .sort-arrow{opacity:1}
.edit-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px;line-height:1;transition:color .2s;font-family:'Karla',sans-serif}
.edit-btn:hover{color:var(--accent)}
.edit-row{display:none;background:var(--bg2);border-top:1px dashed var(--border2)}
.edit-row.open{display:table-row}
.edit-inner{padding:14px 16px}
.edit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-label{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500}
.edit-input{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-family:'Karla',sans-serif;font-size:.82rem;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
.edit-input:focus{border-color:var(--green)}
/* #7: actions édition réorganisées */
.edit-actions{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.save-btn{background:var(--green-mid);border:none;color:#0a120b;padding:7px 14px;border-radius:6px;font-family:'Karla',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap}
.save-btn:hover{background:var(--green)}
.cancel-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text-muted);padding:7px 12px;border-radius:6px;font-family:'Karla',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap}
.delete-btn-edit{background:var(--surface);border:1px solid rgba(248,113,113,.4);color:var(--red);padding:7px 12px;border-radius:6px;font-family:'Karla',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green-mid);color:#0a120b;padding:10px 20px;border-radius:20px;font-size:.82rem;font-weight:500;z-index:1000;transition:transform .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:30px;color:var(--text-muted);font-size:.82rem}

/* #8: tableau cultures planifiées responsive mobile */
@media(max-width:640px) {
  .liste-table thead th.col-famille,
  .liste-table tbody td.col-famille,
  .liste-table thead th.col-semis,
  .liste-table tbody td.col-semis,
  .liste-table thead th.col-recolte,
  .liste-table tbody td.col-recolte { display:none }
  .liste-table thead th.col-plants,
  .liste-table tbody td.col-plants { display:none }
}
@media(max-width:400px) {
  .liste-table thead th.col-actions,
  .liste-table tbody td.col-actions { width:48px }
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header>
  <div class="header-top">
    <a href="/recoltes.html" class="back-btn">← Récoltes</a>
    <div style="font-size:.65rem;opacity:.6;letter-spacing:.08em">SAISON 2025–2026</div>
  </div>
  <div class="header-title">📅 Calendrier de plantation</div>
  <!-- #6: suppression "récolte prévue vs réelle" du sous-titre -->
  <div class="header-sub">Semis · Plantation · Suivi des récoltes</div>
  <div class="header-stats">
    <div class="hstat"><span class="hstat-val" id="hNbCultures">—</span><span class="hstat-lbl">cultures planifiées</span></div>
    <div class="hstat"><span class="hstat-val" id="hEnCours">—</span><span class="hstat-lbl">en cours</span></div>
    <div class="hstat"><span class="hstat-val" id="hRecolteesOk">—</span><span class="hstat-lbl">récoltées</span></div>
    <div class="hstat"><span class="hstat-val" id="hAVenir">—</span><span class="hstat-lbl">à venir</span></div>
  </div>
</header>

<main>
  <!-- #5: onglets réordonnés — Planifier en premier, Calendrier en second -->
  <!-- #1: suppression de l'onglet "Prévu vs Réel" -->
  <div class="tab-nav">
    <button class="tnav active" onclick="showTab('ajout',this)">✚ Planifier</button>
    <button class="tnav" onclick="showTab('calendrier',this)">📅 Calendrier</button>
  </div>

  <!-- TAB AJOUT (maintenant en premier, actif par défaut) -->
  <div class="tab-section active" id="tab-ajout">
    <div class="section">
      <div class="stitle">Planifier une culture</div>
      <div class="saisie-card">
        <div class="saisie-grid">
          <div class="field field-full">
            <label class="field-label">Culture</label>
            <input type="text" id="inp-culture" placeholder="ex: Tomate cerise, Courgette…" autocomplete="off">
          </div>
          <div class="field">
            <label class="field-label">Lieu</label>
            <select id="inp-lieu">
              <option value="serre">🏠 Serre</option>
              <option value="bacs">🪴 Bacs</option>
              <option value="jardin">🌳 Jardin</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label">Date de semis</label>
            <input type="date" id="inp-semis" onchange="autoCalcDates()">
          </div>
          <div class="field">
            <label class="field-label">Date de plantation</label>
            <input type="date" id="inp-plantation" placeholder="Optionnel">
          </div>
          <div class="field">
            <label class="field-label">Début récolte prévue <span style="color:var(--accent);font-size:.55rem">auto</span></label>
            <input type="date" id="inp-recolte-debut" placeholder="calculé auto">
          </div>
          <div class="field">
            <label class="field-label">Fin récolte prévue <span style="color:var(--accent);font-size:.55rem">auto</span></label>
            <input type="date" id="inp-recolte-fin" placeholder="calculé auto">
          </div>
          <div class="field">
            <label class="field-label">Nombre de plants</label>
            <input type="number" id="inp-nbplants" placeholder="ex: 6" min="1" step="1">
          </div>
          <!-- #2: liste complète des familles -->
          <div class="field">
            <label class="field-label">Famille</label>
            <select id="inp-famille" onchange="autoCalcDates()">
              <option value="">— Sélectionner</option>
              <option>SALADES</option>
              <option>BLETTES</option>
              <option>ÉPINARDS</option>
              <option>CHOUX</option>
              <option>LÉGUMES RACINES</option>
              <option>TOMATES</option>
              <option>AUBERGINES</option>
              <option>POIVRONS & PIMENTS</option>
              <option>COURGETTES & COURGES</option>
              <option>CONCOMBRES</option>
              <option>MELONS</option>
              <option>LÉGUMES GOUSSE</option>
              <option>LÉGUMES FRUIT</option>
              <option>AROMATIQUES</option>
              <option>FRAISES</option>
              <option>ARTICHAUT</option>
              <option>AUTRE</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label">Type de culture</label>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;cursor:pointer" onclick="document.getElementById('inp-perpetuelle').click()">
              <input type="checkbox" id="inp-perpetuelle" onclick="event.stopPropagation()" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
              <label for="inp-perpetuelle" style="font-size:.82rem;color:var(--text-dim);cursor:pointer">Culture perpétuelle ♾️</label>
            </div>
          </div>
          <div class="field">
            <label class="field-label">Notes</label>
            <input type="text" id="inp-notes" placeholder="variété, observations…">
          </div>
        </div>
        <div id="dates-hint" style="display:none;font-size:.65rem;color:var(--accent);margin-bottom:8px;padding:6px 10px;background:rgba(163,230,53,.06);border-radius:6px;border:1px solid rgba(163,230,53,.2)"></div>
        <button class="add-btn" onclick="addCulture()">Ajouter au calendrier</button>
      </div>
    </div>

    <!-- Liste des cultures existantes -->
    <div class="section">
      <div class="stitle">Cultures planifiées</div>
      <div id="listeCultures"></div>
    </div>
  </div>

  <!-- TAB CALENDRIER -->
  <div class="tab-section" id="tab-calendrier">
    <div class="section">
      <div class="stitle">Vue annuelle</div>
      <div class="legende">
        <div class="leg-item"><div class="leg-dot" style="background:var(--semis)"></div>Semis</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--plantation)"></div>Plantation</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--recolte);opacity:.5;border:1px dashed var(--recolte)"></div>Récolte prévue</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--recolte-reel)"></div>Récolte réelle</div>
      </div>
      <div class="cal-container" id="calContainer">
        <div style="padding:30px;text-align:center;color:var(--text-muted)">Chargement…</div>
      </div>
    </div>
  </div>
</main>

<script>
// ── LISTE COMPLÈTE DES FAMILLES (source unique partagée sur tout le site) ────
// #2: toutes les familles présentes, blettes et épinards séparés
const TOUTES_FAMILLES = [
  'SALADES',
  'BLETTES',
  'ÉPINARDS',
  'CHOUX',
  'LÉGUMES RACINES',
  'TOMATES',
  'AUBERGINES',
  'POIVRONS & PIMENTS',
  'COURGETTES & COURGES',
  'CONCOMBRES',
  'MELONS',
  'LÉGUMES GOUSSE',
  'LÉGUMES FRUIT',
  'AROMATIQUES',
  'FRAISES',
  'ARTICHAUT',
  'AUTRE',
];

// ── CONSTANTES ────────────────────────────────────────────────
const STORAGE_KEY_CAL  = 'jardin_calendrier_v1';
const STORAGE_KEY_REC  = 'jardin_recoltes_v2';
const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const CURRENT_MONTH = new Date().getMonth();
const CURRENT_YEAR  = new Date().getFullYear();

const FAMILLES_COLORS = {
  'SALADES':'#3d7a4f',
  'BLETTES':'#22c55e',
  'ÉPINARDS':'#16a34a',
  'CHOUX':'#7ab990',
  'LÉGUMES RACINES':'#c47c2b',
  'TOMATES':'#b84040',
  'AUBERGINES':'#8a3a6a',
  'POIVRONS & PIMENTS':'#b85c2b',
  'COURGETTES & COURGES':'#8a7a3a',
  'CONCOMBRES':'#3a7a6e',
  'MELONS':'#7a6a22',
  'LÉGUMES GOUSSE':'#4a7a3a',
  'LÉGUMES FRUIT':'#5a6a3a',
  'AROMATIQUES':'#5a7a3a',
  'FRAISES':'#b84060',
  'ARTICHAUT':'#3a6a8a',
  'AUTRE':'#4a5a4a',
  // Anciennes valeurs conservées pour compatibilité avec données existantes
  'BLETTES & ÉPINARDS':'#22c55e',
  "LÉGUMES D'ÉTÉ":'#3a5a7a',
  'LÉGUMES ETE':'#3a5a7a',
};

const DUREES_FAMILLE = {
  'SALADES':              { semisPlanteation: 30, plantationRecolte: 45, dureeRecolte: 60 },
  'BLETTES':              { semisPlanteation: 35, plantationRecolte: 50, dureeRecolte: 90 },
  'ÉPINARDS':             { semisPlanteation: 25, plantationRecolte: 40, dureeRecolte: 60 },
  'BLETTES & ÉPINARDS':   { semisPlanteation: 35, plantationRecolte: 50, dureeRecolte: 90 },
  'CHOUX':                { semisPlanteation: 35, plantationRecolte: 60, dureeRecolte: 60 },
  'LÉGUMES RACINES':      { semisPlanteation: 0,  plantationRecolte: 90, dureeRecolte: 60 },
  'TOMATES':              { semisPlanteation: 50, plantationRecolte: 75, dureeRecolte: 120 },
  'AUBERGINES':           { semisPlanteation: 60, plantationRecolte: 75, dureeRecolte: 90 },
  'POIVRONS & PIMENTS':   { semisPlanteation: 60, plantationRecolte: 90, dureeRecolte: 120 },
  'COURGETTES & COURGES': { semisPlanteation: 25, plantationRecolte: 45, dureeRecolte: 90 },
  'CONCOMBRES':           { semisPlanteation: 25, plantationRecolte: 45, dureeRecolte: 75 },
  'MELONS':               { semisPlanteation: 30, plantationRecolte: 75, dureeRecolte: 60 },
  'LÉGUMES GOUSSE':       { semisPlanteation: 0,  plantationRecolte: 60, dureeRecolte: 45 },
  'LÉGUMES FRUIT':        { semisPlanteation: 20, plantationRecolte: 60, dureeRecolte: 60 },
  'AROMATIQUES':          { semisPlanteation: 30, plantationRecolte: 30, dureeRecolte: 150 },
  'FRAISES':              { semisPlanteation: 0,  plantationRecolte: 60, dureeRecolte: 90 },
  'ARTICHAUT':            { semisPlanteation: 0,  plantationRecolte: 365, dureeRecolte: 60 },
  'LÉGUMES ETE':          { semisPlanteation: 20, plantationRecolte: 60, dureeRecolte: 60 },
  "LÉGUMES D'ÉTÉ":        { semisPlanteation: 20, plantationRecolte: 60, dureeRecolte: 60 },
};

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function calcDatesRecolte(semis, famille) {
  const dur = DUREES_FAMILLE[famille];
  if (!semis || !dur) return { debut: null, fin: null };
  const totalJusquRecolte = dur.semisPlanteation + dur.plantationRecolte;
  const debut = addDays(semis, totalJusquRecolte);
  const fin   = addDays(debut, dur.dureeRecolte);
  return { debut, fin };
}

// ── DONNÉES PAR DÉFAUT ────────────────────────────────────────

// ── STORAGE ───────────────────────────────────────────────────
function loadCalendrier() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY_CAL) || 'null');
    // #4: toujours retourner les données — si vide côté serveur on part des défauts
    if (saved && saved.length > 0) return saved;
  } catch(e) {}
  saveCalendrier(CULTURES_DEFAUT);
  return [...CULTURES_DEFAUT];
}

function saveCalendrier(data) {
  try { localStorage.setItem(STORAGE_KEY_CAL, JSON.stringify(data)); } catch(e) {}
}

function loadRecoltes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_REC) || '[]'); } catch(e) { return []; }
}

let cultures = loadCalendrier();
const recoltes = loadRecoltes();

// ── #12: Grouper les cultures par nom (fusion multi-lieux) ───
// Retourne une liste de cultures fusionnées :
// chaque entrée = nom unique, avec un tableau des lieux distincts
function getCulturesGroupees() {
  const norm = s => s.toLowerCase()
    .replace(/[éèêë]/g,'e').replace(/[àâ]/g,'a').replace(/[îï]/g,'i')
    .replace(/[ô]/g,'o').replace(/[ùûü]/g,'u').replace(/[ç]/g,'c')
    .trim();

  const map = new Map(); // clé = nom normalisé
  cultures.forEach(c => {
    const key = norm(c.culture);
    if (!map.has(key)) {
      // Premier élément : on le prend comme référence
      map.set(key, { ...c, lieux: [c.lieu], ids: [c.id], allEntries: [c] });
    } else {
      const existing = map.get(key);
      if (!existing.lieux.includes(c.lieu)) {
        existing.lieux.push(c.lieu);
      }
      existing.ids.push(c.id);
      existing.allEntries.push(c);
      // Fusionner les nbPlants
      if (c.nbPlants) {
        existing.nbPlants = (existing.nbPlants || 0) + c.nbPlants;
      }
    }
  });
  return [...map.values()];
}

// ── HELPERS ───────────────────────────────────────────────────
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, j] = d.split('-');
  return j + '/' + m + '/' + y;
}

function fmtDateShort(d) {
  if (!d) return '—';
  const [, m, j] = d.split('-');
  return j + '/' + m;
}

function daysBetween(d1, d2) {
  if (!d1 || !d2) return null;
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

// ── RÉCOLTES RÉELLES PAR CULTURE ─────────────────────────────
function getRecoltesPourCulture(cultureName) {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g,'');
  return recoltes.filter(r => norm(r.vegetal).includes(norm(cultureName)) || norm(cultureName).includes(norm(r.vegetal)));
}

function getPremiereDateReelle(cultureName) {
  const recs = getRecoltesPourCulture(cultureName);
  if (!recs.length) return null;
  return recs.map(r => r.date).sort()[0];
}

function getDerniereDateReelle(cultureName) {
  const recs = getRecoltesPourCulture(cultureName);
  if (!recs.length) return null;
  return recs.map(r => r.date).sort().pop();
}

// ── STATS HEADER ─────────────────────────────────────────────
function updateStats() {
  const today = new Date().toISOString().slice(0, 10);
  const enCours   = cultures.filter(c => c.recolteDebut <= today && c.recolteFin >= today).length;
  const recoltees = cultures.filter(c => getRecoltesPourCulture(c.culture).length > 0).length;
  const aVenir    = cultures.filter(c => c.recolteDebut > today).length;
  document.getElementById('hNbCultures').textContent = cultures.length;
  document.getElementById('hEnCours').textContent    = enCours;
  document.getElementById('hRecolteesOk').textContent = recoltees;
  document.getElementById('hAVenir').textContent     = aVenir;
}

// ── CALENDRIER GRILLE ─────────────────────────────────────────
const CAL_MONTHS = [
  {label:'Sep',year:2025,m:8},{label:'Oct',year:2025,m:9},{label:'Nov',year:2025,m:10},{label:'Déc',year:2025,m:11},
  {label:'Jan',year:2026,m:0},{label:'Fév',year:2026,m:1},{label:'Mar',year:2026,m:2},{label:'Avr',year:2026,m:3},
  {label:'Mai',year:2026,m:4},{label:'Jun',year:2026,m:5},{label:'Jul',year:2026,m:6},{label:'Aoû',year:2026,m:7},
];

function dateToCol(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  for (let i = 0; i < CAL_MONTHS.length; i++) {
    if (CAL_MONTHS[i].year === y && CAL_MONTHS[i].m === m) {
      const daysInM = new Date(y, m + 1, 0).getDate();
      return i + (day - 1) / daysInM;
    }
  }
  const first = CAL_MONTHS[0], last = CAL_MONTHS[11];
  const startMs = new Date(first.year, first.m, 1).getTime();
  const endMs   = new Date(last.year,  last.m + 1, 1).getTime();
  const dMs     = new Date(dateStr).getTime();
  if (dMs < startMs) return 0;
  if (dMs >= endMs)  return 12;
  return null;
}

function renderBar(container, startStr, endStr, className, tooltip) {
  if (!startStr || !endStr) return;
  const s = dateToCol(startStr);
  const e = dateToCol(endStr);
  if (s === null || e === null) return;
  const sc = clamp(s, 0, 12);
  const ec = clamp(e, 0, 12);
  if (ec <= sc) return;

  const bar = document.createElement('div');
  bar.className = 'bar ' + className;
  bar.style.left      = (sc / 12 * 100) + '%';
  bar.style.width     = ((ec - sc) / 12 * 100) + '%';
  bar.style.top       = '50%';
  bar.style.transform = 'translateY(-50%)';

  const tip = document.createElement('div');
  tip.className   = 'bar-tooltip';
  tip.textContent = tooltip;
  bar.appendChild(tip);
  container.appendChild(bar);
}

function renderCalendrier() {
  const container = document.getElementById('calContainer');
  const today = new Date();

  // #11: header avec min-width garanti par le CSS, tous les mois visibles
  let html = '<div class="cal-header">';
  html += '<div class="cal-header-culture">Culture</div>';
  CAL_MONTHS.forEach(mo => {
    const isCurrent = (mo.year === today.getFullYear() && mo.m === today.getMonth());
    html += `<div class="cal-header-month${isCurrent?' current':''}">${mo.label}</div>`;
  });
  html += '</div>';

  // #12: dans le calendrier, on garde une entrée par culture+lieu (pas de fusion ici)
  // mais on affiche les barres pour les deux si même culture dans lieux différents
  const byFam = {};
  cultures.forEach(c => {
    const fam = c.famille || 'AUTRE';
    if (!byFam[fam]) byFam[fam] = [];
    byFam[fam].push(c);
  });

  const famOrder = [...TOUTES_FAMILLES, 'BLETTES & ÉPINARDS', "LÉGUMES D'ÉTÉ", 'LÉGUMES ETE'];

  container.innerHTML = html;

  const seenFams = new Set();
  famOrder.forEach(fam => {
    if (!byFam[fam] || seenFams.has(fam)) return;
    seenFams.add(fam);

    const famRow = document.createElement('div');
    famRow.className = 'cal-row section-header';
    const famLabel = document.createElement('div');
    famLabel.className = 'cal-section-label';
    famLabel.innerHTML = `<span style="color:${FAMILLES_COLORS[fam]||'var(--text-muted)'}">●</span>${fam}`;
    famRow.appendChild(famLabel);
    container.appendChild(famRow);

    byFam[fam].forEach(c => {
      const row = document.createElement('div');
      row.className = 'cal-row';

      const lieuIcons = { serre:'🏠', bacs:'🪴', jardin:'🌳' };
      const cultureCell = document.createElement('div');
      cultureCell.className = 'cal-culture';
      // #10: soulignement via CSS sur .culture-name
      cultureCell.innerHTML = `<span style="font-size:.8rem;flex-shrink:0">${lieuIcons[c.lieu]||''}</span><span class="culture-name">${c.culture}</span>`;
      cultureCell.title = (c.notes ? c.notes + ' — ' : '') + 'Cliquer pour voir la fiche';
      cultureCell.addEventListener('click', () => {
        window.location.href = '/variete.html?v=' + encodeURIComponent(c.culture);
      });
      row.appendChild(cultureCell);

      const barsCell = document.createElement('div');
      barsCell.style.cssText = 'position:relative;grid-column:2/-1;display:block;';

      if (c.semis && c.plantation) {
        renderBar(barsCell, c.semis, c.plantation, 'bar-semis',
          `Semis : ${fmtDateShort(c.semis)} → plantation ${fmtDateShort(c.plantation)}`);
      } else if (c.semis && !c.plantation) {
        const semisEnd = new Date(c.semis);
        semisEnd.setDate(semisEnd.getDate() + 14);
        renderBar(barsCell, c.semis, semisEnd.toISOString().slice(0,10), 'bar-semis',
          `Semis direct : ${fmtDateShort(c.semis)}`);
      }

      if (c.plantation && c.recolteDebut) {
        renderBar(barsCell, c.plantation, c.recolteDebut, 'bar-plantation',
          `En place : ${fmtDateShort(c.plantation)} → ${fmtDateShort(c.recolteDebut)}`);
      }

      if (c.recolteDebut && c.recolteFin) {
        renderBar(barsCell, c.recolteDebut, c.recolteFin, 'bar-recolte-prev',
          `Récolte prévue : ${fmtDateShort(c.recolteDebut)} → ${fmtDateShort(c.recolteFin)}`);
      }

      const premierReel = getPremiereDateReelle(c.culture);
      const dernierReel = getDerniereDateReelle(c.culture);
      if (premierReel) {
        const finReel = dernierReel || premierReel;
        const finReelDate = new Date(finReel);
        finReelDate.setDate(finReelDate.getDate() + 1);
        renderBar(barsCell, premierReel, finReelDate.toISOString().slice(0,10), 'bar-recolte-reel',
          `Récolte réelle : ${fmtDateShort(premierReel)}${premierReel !== dernierReel ? ' → ' + fmtDateShort(dernierReel) : ''}`);
      }

      row.appendChild(barsCell);
      container.appendChild(row);
    });
  });

  // Ligne aujourd'hui
  const todayCol = dateToCol(today.toISOString().slice(0,10));
  if (todayCol !== null) {
    const line = document.createElement('div');
    line.style.cssText = 'position:absolute;top:0;bottom:0;width:2px;background:var(--accent);opacity:.6;pointer-events:none;z-index:10;';
    container.style.position = 'relative';
    line.style.left = `calc(150px + ${todayCol / 12} * (100% - 150px))`;
    container.appendChild(line);
  }
}

// ── AJOUT CULTURE ─────────────────────────────────────────────
function autoCalcDates() {
  const semis   = document.getElementById('inp-semis').value;
  const famille = document.getElementById('inp-famille').value;
  if (!semis || !famille) return;
  const { debut, fin } = calcDatesRecolte(semis, famille);
  if (debut) {
    const debutEl = document.getElementById('inp-recolte-debut');
    const finEl   = document.getElementById('inp-recolte-fin');
    if (!debutEl.value) debutEl.value = debut;
    if (!finEl.value)   finEl.value   = fin;
    const hint = document.getElementById('dates-hint');
    if (hint) {
      const dur = DUREES_FAMILLE[famille];
      hint.textContent = `Estimé : ${dur.semisPlanteation + dur.plantationRecolte}j du semis à la première récolte, fenêtre de ${dur.dureeRecolte}j`;
      hint.style.display = 'block';
    }
  }
}

function addCulture() {
  const culture      = document.getElementById('inp-culture').value.trim();
  const lieu         = document.getElementById('inp-lieu').value;
  const semis        = document.getElementById('inp-semis').value;
  const plantation   = document.getElementById('inp-plantation').value;
  const recolteDebut = document.getElementById('inp-recolte-debut').value;
  const recolteFin   = document.getElementById('inp-recolte-fin').value;
  const famille      = document.getElementById('inp-famille').value;
  const nbPlants     = parseInt(document.getElementById('inp-nbplants').value) || null;
  const estPerpetuelle = document.getElementById('inp-perpetuelle').checked;
  const notes        = document.getElementById('inp-notes').value.trim();

  if (!culture || !semis) {
    alert('Le nom de la culture et la date de semis sont obligatoires.');
    return;
  }

  let finalDebut = recolteDebut, finalFin = recolteFin;
  if ((!finalDebut || !finalFin) && famille) {
    const auto = calcDatesRecolte(semis, famille);
    if (!finalDebut) finalDebut = auto.debut;
    if (!finalFin)   finalFin   = auto.fin;
  }

  const newCulture = {
    id: 'c' + Date.now(),
    culture, lieu, semis,
    plantation: plantation || null,
    recolteDebut: finalDebut, recolteFin: finalFin,
    famille, nbPlants, notes, estPerpetuelle,
    datesAuto: (!recolteDebut && !recolteFin),
  };

  cultures.push(newCulture);
  saveCalendrier(cultures);
  updateStats();
  renderListe();
  showToast('✓ ' + culture + ' ajouté au calendrier');

  document.getElementById('inp-culture').value = '';
  document.getElementById('inp-semis').value = '';
  document.getElementById('inp-plantation').value = '';
  document.getElementById('inp-recolte-debut').value = '';
  document.getElementById('inp-recolte-fin').value = '';
  document.getElementById('inp-nbplants').value = '';
  document.getElementById('inp-perpetuelle').checked = false;
  document.getElementById('inp-notes').value = '';
  const hint = document.getElementById('dates-hint');
  if (hint) hint.style.display = 'none';
}

// #3: deleteCulture accepte tous les ids (y compris ceux des entrées par défaut)
function deleteCulture(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Supprimer cette culture du calendrier ?')) return;
  cultures = cultures.filter(c => c.id !== id);
  saveCalendrier(cultures);
  updateStats();
  renderListe();
  showToast('Culture supprimée');
}

// #12: supprimer toutes les entrées d'un groupe (fusion multi-lieux)
function deleteGroupe(ids, e) {
  if (e) e.stopPropagation();
  if (!confirm('Supprimer toutes les occurrences de cette culture ?')) return;
  cultures = cultures.filter(c => !ids.includes(c.id));
  saveCalendrier(cultures);
  updateStats();
  renderListe();
  showToast('Culture(s) supprimée(s)');
}

function toggleEditRow(id, e) {
  if (e) e.stopPropagation();
  const row = document.getElementById('edit-row-' + id);
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.edit-row.open').forEach(r => r.classList.remove('open'));

}

function cancelEdit(id, e) {
  if (e) e.stopPropagation();
  document.getElementById('edit-row-' + id).classList.remove('open');
}

function saveEdit(id, e) {
  if (e) e.stopPropagation();
  const idx = cultures.findIndex(c => c.id === id);
  if (idx === -1) return;

  const culture      = document.getElementById(`ec-culture-${id}`).value.trim();
  const lieu         = document.getElementById(`ec-lieu-${id}`).value;
  const famille      = document.getElementById(`ec-famille-${id}`).value;
  const semis        = document.getElementById(`ec-semis-${id}`).value;
  const plantation   = document.getElementById(`ec-plantation-${id}`).value || null;
  const recolteDebut = document.getElementById(`ec-rdebut-${id}`).value;
  const recolteFin   = document.getElementById(`ec-rfin-${id}`).value;
  const nbPlants     = parseInt(document.getElementById(`ec-nbplants-${id}`).value) || null;
  const estPerpetuelle = document.getElementById(`ec-perpetuelle-${id}`).checked;
  const notes        = document.getElementById(`ec-notes-${id}`).value.trim();

  if (!culture || !semis || !recolteDebut || !recolteFin) {
    alert('Culture, semis et dates de récolte sont obligatoires.'); return;
  }

  cultures[idx] = { ...cultures[idx], culture, lieu, famille, semis, plantation, recolteDebut, recolteFin, nbPlants, estPerpetuelle, notes };
  saveCalendrier(cultures);
  updateStats();
  renderListe();
  if (document.getElementById('tab-calendrier').classList.contains('active')) renderCalendrier();
  showToast('✓ ' + culture + ' mis à jour');
}

// ── TRI LISTE CULTURES ───────────────────────────────────────
let sortCol = 'culture';
let sortDir = 1;

function sortListe(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderListe();
}

function sortedGroupes() {
  const groupes = getCulturesGroupees();
  return groupes.sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 'culture': va = a.culture||'';      vb = b.culture||'';      break;
      case 'famille': va = a.famille||'';      vb = b.famille||'';      break;
      case 'semis':   va = a.semis||'';        vb = b.semis||'';        break;
      case 'recolte': va = a.recolteDebut||''; vb = b.recolteDebut||''; break;
      case 'plants':  va = a.nbPlants||0;      vb = b.nbPlants||0;      break;
      default:        va = ''; vb = '';
    }
    if (typeof va === 'number') return (va - vb) * sortDir;
    return va.localeCompare(vb, 'fr') * sortDir;
  });
}

// ── #8 + #9 + #12: Rendu liste cultures fusionnées ───────────
function renderListe() {
  const el = document.getElementById('listeCultures');
  if (!cultures.length) { el.innerHTML = '<div class="empty">Aucune culture planifiée.</div>'; return; }

  const lieuIcons = { serre:'🏠', bacs:'🪴', jardin:'🌳' };

  // #12: une ligne par culture unique (fusion multi-lieux)
  const rows = sortedGroupes().map(g => {
    // g.ids = tableau de tous les ids de ce groupe
    // Pour l'édition, on utilise l'id du premier élément (référence)
    const c = g; // c = entrée fusionnée (référence)
    const editId = g.ids[0]; // id de référence pour le formulaire d'édition

    const recs    = getRecoltesPourCulture(c.culture);
    const hasReel = recs.length > 0;

    const plantsBadge = c.nbPlants
      ? `<span style="color:var(--green)">${c.nbPlants} plants</span>`
      : `<span style="color:var(--amber);font-size:.68rem">⚠ à renseigner</span>`;

    // #12: afficher toutes les icônes de lieux
    const lieuxIcons = g.lieux.map(l => lieuIcons[l] || '').join(' ');

    // #9: soulignement pointillé sur le nom
    const cultureLink = `<span
      style="cursor:pointer;text-decoration:underline dotted;text-decoration-color:rgba(74,222,128,.5);text-underline-offset:3px;"
      onclick="event.stopPropagation();window.location.href='/variete.html?v='+encodeURIComponent('${c.culture.replace(/'/g, "\\'")}')"
      title="Voir la fiche variété"
    >${c.culture}</span>`;

    const badgeReel = hasReel
      ? '<span style="margin-left:4px;font-size:.58rem;background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.3);padding:1px 4px;border-radius:8px">✓</span>'
      : '';

    const badgePerp = c.estPerpetuelle
      ? '<span style="margin-left:4px;font-size:.58rem;background:rgba(163,230,53,.1);color:var(--accent);border:1px solid rgba(163,230,53,.3);padding:1px 4px;border-radius:8px">♾️</span>'
      : '';

    // Sélecteur de familles complet
    const famOptions = TOUTES_FAMILLES.map(f =>
      `<option value="${f}" ${c.famille===f?'selected':''}>${f}</option>`
    ).join('');

    return `
      <tr id="view-row-${editId}"
          style="border-bottom:1px solid var(--border);cursor:pointer"
          onmouseover="this.style.background='var(--green-light)'"
          onmouseout="this.style.background=''"
          onclick="toggleEditRow('${editId}',event)">
        <td style="padding:8px 10px;color:var(--text);font-weight:500;min-width:0">
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span style="white-space:nowrap;font-size:.9rem">${lieuxIcons}</span>
            ${cultureLink}${badgeReel}${badgePerp}
          </div>
        </td>
        <td class="col-famille" style="padding:8px 8px;color:var(--text-dim);font-size:.72rem;white-space:nowrap">${c.famille||'—'}</td>
        <td class="col-semis" style="padding:8px 8px;color:var(--text-dim);white-space:nowrap;font-size:.75rem">${fmtDate(c.semis)}</td>
        <td class="col-recolte" style="padding:8px 8px;color:var(--text-dim);font-size:.72rem;white-space:nowrap">${fmtDate(c.recolteDebut)}<br><span style="opacity:.6">→ ${fmtDate(c.recolteFin)}</span></td>
        <td class="col-plants" style="padding:8px 8px">${plantsBadge}</td>
        <td class="col-actions" style="padding:8px 6px;text-align:right;white-space:nowrap">
          <button class="edit-btn" onclick="toggleEditRow('${editId}',event)" title="Modifier">✏</button>
          <button class="del-btn" onclick="deleteGroupe(${JSON.stringify(g.ids)},event)" title="Supprimer">✕</button>
        </td>
      </tr>
      <tr class="edit-row" id="edit-row-${editId}">
        <td colspan="6">
          <div class="edit-inner">
            <div class="edit-grid">
              <div class="edit-field" style="grid-column:1/-1">
                <label class="edit-label">Culture</label>
                <input class="edit-input" id="ec-culture-${editId}" value="${c.culture.replace(/"/g,'&quot;')}">
              </div>
              <div class="edit-field">
                <label class="edit-label">Lieu</label>
                <select class="edit-input" id="ec-lieu-${editId}">
                  <option value="serre"  ${c.lieu==='serre' ?'selected':''}>🏠 Serre</option>
                  <option value="bacs"   ${c.lieu==='bacs'  ?'selected':''}>🪴 Bacs</option>
                  <option value="jardin" ${c.lieu==='jardin'?'selected':''}>🌳 Jardin</option>
                </select>
              </div>
              <div class="edit-field">
                <label class="edit-label">Famille</label>
                <select class="edit-input" id="ec-famille-${editId}">
                  <option value="">—</option>
                  ${famOptions}
                </select>
              </div>
              <div class="edit-field">
                <label class="edit-label">Nb plants</label>
                <input class="edit-input" type="number" id="ec-nbplants-${editId}" value="${c.nbPlants||''}" placeholder="ex: 6" min="1">
              </div>
              <div class="edit-field">
                <label class="edit-label">Type</label>
                <div style="display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;cursor:pointer" onclick="document.getElementById('ec-perpetuelle-${editId}').click()">
                  <input type="checkbox" id="ec-perpetuelle-${editId}" ${c.estPerpetuelle?'checked':''} onclick="event.stopPropagation()" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
                  <span style="font-size:.78rem;color:var(--text-dim)">Perpétuelle ♾️</span>
                </div>
              </div>
              <div class="edit-field">
                <label class="edit-label">Semis</label>
                <input class="edit-input" type="date" id="ec-semis-${editId}" value="${c.semis||''}">
              </div>
              <div class="edit-field">
                <label class="edit-label">Plantation</label>
                <input class="edit-input" type="date" id="ec-plantation-${editId}" value="${c.plantation||''}">
              </div>
              <div class="edit-field">
                <label class="edit-label">Début récolte</label>
                <input class="edit-input" type="date" id="ec-rdebut-${editId}" value="${c.recolteDebut||''}">
              </div>
              <div class="edit-field">
                <label class="edit-label">Fin récolte</label>
                <input class="edit-input" type="date" id="ec-rfin-${editId}" value="${c.recolteFin||''}">
              </div>
              <div class="edit-field" style="grid-column:1/-1">
                <label class="edit-label">Notes</label>
                <input class="edit-input" id="ec-notes-${editId}" value="${(c.notes||'').replace(/"/g,'&quot;')}" placeholder="observations, variété…">
              </div>
            </div>
            <!-- #7: boutons bien équilibrés, pas de flex:1 sur enregistrer -->
            <div class="edit-actions">
              <button class="save-btn" onclick="saveEdit('${editId}',event)">💾 Enregistrer</button>
              <button class="cancel-btn" onclick="cancelEdit('${editId}',event)">Annuler</button>
              <button class="delete-btn-edit" onclick="deleteGroupe(${JSON.stringify(g.ids)},event)">🗑 Supprimer</button>
            </div>
          </div>
        </td>
      </tr>`;
  }).join('');

  // #8: tableau responsive avec classes sur les colonnes
  el.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <table class="liste-table" style="width:100%;border-collapse:collapse;font-size:.78rem">
      <thead style="background:var(--bg2);border-bottom:1px solid var(--border)">
        <tr>
          <th class="th-sort ${sortCol==='culture'?'active':''}" onclick="sortListe('culture')"
              style="padding:8px 10px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">
            Culture<span class="sort-arrow">${sortCol==='culture'?(sortDir===1?'▲':'▼'):'⇅'}</span>
          </th>
          <th class="th-sort col-famille ${sortCol==='famille'?'active':''}" onclick="sortListe('famille')"
              style="padding:8px 8px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">
            Famille<span class="sort-arrow">${sortCol==='famille'?(sortDir===1?'▲':'▼'):'⇅'}</span>
          </th>
          <th class="th-sort col-semis ${sortCol==='semis'?'active':''}" onclick="sortListe('semis')"
              style="padding:8px 8px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">
            Semis<span class="sort-arrow">${sortCol==='semis'?(sortDir===1?'▲':'▼'):'⇅'}</span>
          </th>
          <th class="th-sort col-recolte ${sortCol==='recolte'?'active':''}" onclick="sortListe('recolte')"
              style="padding:8px 8px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">
            Récolte<span class="sort-arrow">${sortCol==='recolte'?(sortDir===1?'▲':'▼'):'⇅'}</span>
          </th>
          <th class="th-sort col-plants ${sortCol==='plants'?'active':''}" onclick="sortListe('plants')"
              style="padding:8px 8px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">
            Plants<span class="sort-arrow">${sortCol==='plants'?(sortDir===1?'▲':'▼'):'⇅'}</span>
          </th>
          <th class="col-actions" style="padding:8px 6px;text-align:right;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-weight:500">Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('inp-semis').valueAsDate = new Date();
updateStats();
// #5: Planifier est le premier onglet, on rend la liste au démarrage
renderListe();
</script>
</body>
</html>
