<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a120b">
<title>Récoltes — Jardin Vivant</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200&family=DM+Mono:wght@300;400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a120b;
  --bg2: #0f1c10;
  --surface: #1a2e1c;
  --border: #2a4030;
  --border2: #3a5040;
  --text: #e8f5ea;
  --text-dim: #8fb898;
  --text-muted: #4a6b52;
  --green: #4ade80;
  --green-light: rgba(74,222,128,0.1);
  --green-mid: #22c55e;
  --green-dark: #166534;
  --amber: #fbbf24;
  --amber-light: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-light: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-light: rgba(96,165,250,0.1);
  --accent: #a3e635;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Karla', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ── HEADER — identique à index.html ── */
header{position:sticky;top:0;z-index:100;background:rgba(10,18,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;color:var(--accent);display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
.header-right{display:flex;align-items:center;gap:10px}
.header-status{font-size:.62rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}

/* ── SAISON SELECT (dans le header-right) ── */
.saison-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .06em;
  padding: 4px 8px;
  border-radius: 7px;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .2s;
}
.saison-select:focus { border-color: var(--accent); }
.saison-select option { background: #0a120b; color: var(--text); }

/* ── NAV PRINCIPALE — identique à index.html nav-tabs, mais dans main ── */
.nav-tabs{display:flex;gap:3px;margin-bottom:0;background:var(--surface);padding:3px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:7px;transition:all .2s}
.tab.active{background:#142016;color:var(--accent);border:1px solid var(--border)}
.tab:hover:not(.active){color:var(--text-dim)}

/* ── NAV SECONDAIRE — même charte que nav-tabs mais pills ── */
.nav-secondary{margin-top:6px;margin-bottom:16px;display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:10px;border:1px solid var(--border)}
.nav-sec-tab{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:7px;transition:all .2s;white-space:nowrap}
.nav-sec-tab.active{background:#142016;color:var(--accent);border:1px solid var(--border)}
.nav-sec-tab:hover:not(.active){color:var(--text-dim)}

/* ── CONTENU PRINCIPAL — identique à index.html ── */
main{max-width:900px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* ── METRIC CARDS — identique à index.html ── */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green-dark),transparent);opacity:.6}
.metric-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace}
.metric-unit{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.stitle {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stitle::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section { margin-bottom: 28px; }

/* ── SAISIE ── */
.saisie-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
  position: relative;
  overflow: hidden;
}

.saisie-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .4;
}

.saisie-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

@media(max-width: 500px) { .saisie-grid { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 4px; }

.field-label {
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  font-family: 'DM Mono', monospace;
}

.field input, .field select {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Karla', sans-serif;
  font-size: .88rem;
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(163,230,53,.1);
}

.field-full { grid-column: 1 / -1; }

.add-btn {
  background: var(--green-mid);
  color: #0a120b;
  border: none;
  border-radius: 8px;
  padding: 11px 20px;
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  cursor: pointer;
  width: 100%;
  letter-spacing: .04em;
  transition: all .2s;
}

.add-btn:hover { background: var(--green); }
.add-btn:active { transform: scale(.98); }

/* Suggestions */
.suggestions {
  position: absolute;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  z-index: 100;
  max-height: 180px;
  overflow-y: auto;
  width: 100%;
  left: 0;
  top: 100%;
  margin-top: 2px;
}

.suggestion-item {
  padding: 8px 12px;
  font-size: .85rem;
  cursor: pointer;
  transition: background .15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.suggestion-item:hover { background: var(--green-light); }
.suggestion-item .fam { font-size: .65rem; color: var(--text-muted); }
.field-wrap { position: relative; }

/* ── STATS RÉSUMÉ ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.stat-val {
  font-family: 'Fraunces', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--green);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-lbl {
  font-size: .6rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

/* ── CHARTS ── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

@media(max-width:560px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}

.chart-card.wide { grid-column: 1 / -1; }

.chart-title {
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-family: 'DM Mono', monospace;
}

.chart-wrap { position: relative; height: 160px; }
.chart-wrap.tall { height: 200px; }

/* ── ONGLETS GRAPHIQUES ── */
.tab-nav {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
  background: var(--bg2);
  padding: 3px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.tnav {
  flex: 1;
  padding: 7px 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all .2s;
}

.tnav.active {
  background: var(--green-dark);
  color: var(--accent);
  border: 1px solid rgba(163,230,53,.3);
}

.tab-section { display: none; }
.tab-section.active { display: block; }

/* ── TOP PLANTES ── */
.top-tab-nav {
  display: flex;
  gap: 3px;
  margin-bottom: 12px;
  background: var(--bg2);
  padding: 3px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.top-tnav {
  flex: 1;
  padding: 7px 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all .2s;
}

.top-tnav.active {
  background: var(--green-dark);
  color: var(--accent);
  border: 1px solid rgba(163,230,53,.3);
}

.top-tab-section { display: none; }
.top-tab-section.active { display: block; }
.top-list { display: flex; flex-direction: column; gap: 6px; }

.top-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.top-rank {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--text-muted);
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.top-rank.gold { color: #c9a227; }
.top-rank.silver { color: #8a8a9a; }
.top-rank.bronze { color: #a0673a; }

.top-name { flex: 1; font-weight: 500; font-size: .85rem; }
.top-sub { font-size: .65rem; color: var(--text-muted); }

.top-val {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 300;
  color: var(--green);
  text-align: right;
  flex-shrink: 0;
}

.bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--green-mid);
  border-radius: 2px;
  transition: width .6s ease;
}

/* ── TABLEAU ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; font-size: .82rem; }

thead tr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 10px 12px;
  text-align: left;
  font-size: .58rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  font-family: 'DM Mono', monospace;
}

th:hover { color: var(--accent); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  cursor: pointer;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--green-light); }
td { padding: 10px 12px; color: var(--text-dim); }
td:first-child { color: var(--text); font-weight: 500; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: .65rem;
  font-weight: 500;
  white-space: nowrap;
}

.badge-serre { background: var(--blue-light); color: var(--blue); }
.badge-bacs  { background: var(--amber-light); color: var(--amber); }
.badge-jardin { background: var(--green-light); color: var(--green); }

.stars { color: var(--amber); font-size: .75rem; }

/* Row detail */
.row-detail { display: none; background: var(--bg2); border-top: 1px dashed var(--border2); }
.row-detail.open { display: table-row; }
.detail-inner {
  padding: 12px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
.detail-key { font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
.detail-val { font-size: .82rem; color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-mid);
  color: #0a120b;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: .82rem;
  font-weight: 500;
  z-index: 1000;
  transition: transform .3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  font-family: 'DM Mono', monospace;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.empty {
  text-align: center;
  padding: 30px;
  color: var(--text-muted);
  font-size: .82rem;
}

@media(max-width:480px) {
  th:nth-child(n+4), td:nth-child(n+4) { display: none; }
}
</style>
</head>
<body>

<!-- ── HEADER — identique à index.html ── -->
<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div>Jardin Vivant</div>
    <div class="header-right">
      <select class="saison-select" id="saisonSelect" onchange="changerSaison(this.value)" title="Filtrer par saison">
        <option value="toutes">Toutes les saisons</option>
      </select>

    </div>
  </div>
</header>

<main>

  <!-- NAV PRINCIPALE — identique à index.html nav-tabs -->
  <div class="nav-tabs">
    <button class="tab" onclick="window.location.href='/'">Dashboard</button>
    <button class="tab" onclick="window.location.href='/'">Appareils</button>
    <button class="tab" onclick="window.location.href='/bassin.html'">Bassin</button>
    <button class="tab active">Cultures</button>
    <button class="tab" onclick="window.location.href='/'">Conseils</button>
  </div>

  <!-- NAV SECONDAIRE — même charte que nav-tabs -->
  <div class="nav-secondary">
    <button class="nav-sec-tab active" onclick="showSecTab('recoltes', this)">🌿 Récoltes</button>
    <button class="nav-sec-tab" onclick="showSecTab('calendrier', this)">📅 Calendrier</button>
    <button class="nav-sec-tab" onclick="showSecTab('planifier', this)">✚ Planifier</button>
  </div>

  <!-- SYNC BADGE -->
  <div style="text-align:right;margin-bottom:8px;margin-top:4px">
    <span id="syncBadge" style="font-size:.62rem;color:var(--green);letter-spacing:.08em;opacity:0;transition:opacity .5s;font-family:'DM Mono',monospace"></span>
  </div>

  <!-- ══ ONGLET RÉCOLTES ══ -->
  <div id="tab-recoltes">

    <!-- hidden stat holders (still updated by renderStats for header kg display) -->
    <div style="display:none">
      <span id="hTotalKg"></span>
      <span id="hNbRecoltes"></span>
      <span id="hNbVarietes"></span>
      <span id="hMeilleur"></span>
    </div>
    <div class="section">
      <div class="stitle">✚ Nouvelle récolte</div>
      <div class="saisie-card">
        <div class="saisie-grid">
          <div class="field field-full">
            <label class="field-label">Végétal récolté</label>
            <div class="field-wrap">
              <input type="text" id="inp-vegetal" placeholder="ex: Pak choï, Tomate cerise…" autocomplete="off" oninput="showSuggestions(this.value)" onblur="hideSuggestions()">
              <div class="suggestions" id="suggestions" style="display:none"></div>
            </div>
          </div>
          <div class="field">
            <label class="field-label">Lieu de récolte</label>
            <select id="inp-lieu">
              <option value="serre">🏠 Serre aquaponique</option>
              <option value="bacs">🪴 Bacs surélevés</option>
              <option value="jardin">🌳 Potager extérieur</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label">Poids récolté (g)</label>
            <input type="number" id="inp-poids" placeholder="ex: 450" min="1" step="1">
          </div>
          <div class="field">
            <label class="field-label">Date</label>
            <input type="date" id="inp-date">
          </div>
          <div class="field">
            <label class="field-label">Note (1–5)</label>
            <select id="inp-note">
              <option value="">— Sans note</option>
              <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
              <option value="4">⭐⭐⭐⭐ Bien</option>
              <option value="3">⭐⭐⭐ Correct</option>
              <option value="2">⭐⭐ Moyen</option>
              <option value="1">⭐ Déçu</option>
            </select>
          </div>
        </div>
        <button class="add-btn" onclick="addRecolte()">Ajouter cette récolte</button>
      </div>
    </div>

    <!-- STATS RÉSUMÉ -->
    <div class="section">
      <div class="stitle">📊 Vue d'ensemble</div>
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="s1">—</span><span class="stat-lbl">Total récolté (kg)</span></div>
        <div class="stat-card"><span class="stat-val" id="s2">—</span><span class="stat-lbl">Serre (kg)</span></div>
        <div class="stat-card"><span class="stat-val" id="s3">—</span><span class="stat-lbl">Bacs (kg)</span></div>
        <div class="stat-card"><span class="stat-val" id="s4">—</span><span class="stat-lbl">Jardin (kg)</span></div>
        <div class="stat-card"><span class="stat-val" id="s5">—</span><span class="stat-lbl">Plants cultivés</span></div>
        <div class="stat-card"><span class="stat-val" id="s6">—</span><span class="stat-lbl">Variétés dans mon jardin</span></div>
      </div>

      <!-- Onglets graphiques -->
      <div class="tab-nav">
        <button class="tnav active" onclick="showAnalyse('famille',this)">Par famille</button>
        <button class="tnav" onclick="showAnalyse('lieu',this)">Par lieu</button>
        <button class="tnav" onclick="showAnalyse('mois',this)">Par mois</button>
      </div>

      <div class="tab-section active" id="analyse-famille">
        <div class="chart-card">
          <div class="chart-title">Récoltes par famille (g)</div>
          <div class="chart-wrap tall"><canvas id="chartFamille"></canvas></div>
        </div>
      </div>

      <div class="tab-section" id="analyse-lieu">
        <div class="charts-grid">
          <div class="chart-card">
            <div class="chart-title">Répartition par lieu</div>
            <div class="chart-wrap"><canvas id="chartLieu"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Évolution des récoltes</div>
            <div class="chart-wrap"><canvas id="chartEvolution"></canvas></div>
          </div>
        </div>
      </div>

      <div class="tab-section" id="analyse-mois">
        <div class="chart-card">
          <div class="chart-title">Récoltes par mois (g)</div>
          <div class="chart-wrap"><canvas id="chartMois"></canvas></div>
        </div>
      </div>

    </div>

    <!-- TOP PLANTES -->
    <div class="section">
      <div class="stitle">🏆 Top rendement</div>
      <div class="top-tab-nav">
        <button class="top-tnav active" onclick="showTop('serre',this)">🏠 Serre</button>
        <button clas
