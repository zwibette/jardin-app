<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond -->
  <rect width="512" height="512" rx="110" fill="#0a120b"/>

  <!-- Serre - toit arrondi caractéristique MyFood City -->
  <path d="M80 320 Q80 140 256 120 Q432 140 432 320 Z" fill="#0f1c10" stroke="#4ade80" stroke-width="6"/>

  <!-- Panneaux vitrés du toit - lignes horizontales -->
  <path d="M100 280 Q256 245 412 280" fill="none" stroke="#2a4030" stroke-width="2.5"/>
  <path d="M118 240 Q256 210 394 240" fill="none" stroke="#2a4030" stroke-width="2.5"/>
  <path d="M148 200 Q256 177 364 200" fill="none" stroke="#2a4030" stroke-width="2.5"/>
  <path d="M190 165 Q256 150 322 165" fill="none" stroke="#2a4030" stroke-width="2"/>

  <!-- Reflet vitrage -->
  <path d="M130 260 Q180 230 230 245" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.3"/>
  <path d="M155 215 Q200 192 245 205" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.2"/>

  <!-- Sol / base -->
  <rect x="72" y="318" width="368" height="18" rx="5" fill="#166534"/>

  <!-- Murs latéraux arrondis -->
  <rect x="72" y="290" width="22" height="30" rx="3" fill="#1a2e1c" stroke="#4ade80" stroke-width="3"/>
  <rect x="418" y="290" width="22" height="30" rx="3" fill="#1a2e1c" stroke="#4ade80" stroke-width="3"/>

  <!-- Tours de culture verticales (signature MyFood) -->
  <!-- Tour gauche -->
  <rect x="148" y="195" width="28" height="125" rx="14" fill="#1a2e1c" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="162" cy="215" r="10" fill="#22c55e"/>
  <circle cx="162" cy="240" r="10" fill="#16a34a"/>
  <circle cx="162" cy="265" r="10" fill="#22c55e"/>
  <circle cx="162" cy="290" r="8" fill="#15803d"/>

  <!-- Tour centre-gauche -->
  <rect x="210" y="178" width="28" height="142" rx="14" fill="#1a2e1c" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="224" cy="196" r="10" fill="#4ade80"/>
  <circle cx="224" cy="221" r="10" fill="#22c55e"/>
  <circle cx="224" cy="246" r="10" fill="#16a34a"/>
  <circle cx="224" cy="271" r="10" fill="#22c55e"/>
  <circle cx="224" cy="296" r="8" fill="#15803d"/>

  <!-- Tour centre -->
  <rect x="242" y="170" width="28" height="150" rx="14" fill="#1a2e1c" stroke="#a3e635" stroke-width="3"/>
  <circle cx="256" cy="188" r="11" fill="#a3e635"/>
  <circle cx="256" cy="214" r="11" fill="#4ade80"/>
  <circle cx="256" cy="240" r="11" fill="#22c55e"/>
  <circle cx="256" cy="266" r="11" fill="#4ade80"/>
  <circle cx="256" cy="292" r="9" fill="#16a34a"/>

  <!-- Tour centre-droite -->
  <rect x="274" y="178" width="28" height="142" rx="14" fill="#1a2e1c" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="288" cy="196" r="10" fill="#4ade80"/>
  <circle cx="288" cy="221" r="10" fill="#22c55e"/>
  <circle cx="288" cy="246" r="10" fill="#16a34a"/>
  <circle cx="288" cy="271" r="10" fill="#22c55e"/>
  <circle cx="288" cy="296" r="8" fill="#15803d"/>

  <!-- Tour droite -->
  <rect x="336" y="195" width="28" height="125" rx="14" fill="#1a2e1c" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="350" cy="215" r="10" fill="#22c55e"/>
  <circle cx="350" cy="240" r="10" fill="#16a34a"/>
  <circle cx="350" cy="265" r="10" fill="#22c55e"/>
  <circle cx="350" cy="290" r="8" fill="#15803d"/>

  <!-- Bassin aquaponique en bas -->
  <rect x="110" y="340" width="292" height="42" rx="8" fill="#0c1f3f" stroke="#60a5fa" stroke-width="2"/>
  <!-- Eau ondulée -->
  <path d="M120 358 Q160 350 200 358 Q240 366 280 358 Q320 350 360 358 Q385 362 392 358" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
  <path d="M120 368 Q155 362 190 368 Q225 374 260 368 Q295 362 330 368 Q360 372 392 368" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <!-- Petits poissons stylisés -->
  <ellipse cx="175" cy="360" rx="12" ry="5" fill="#60a5fa" opacity="0.5"/>
  <ellipse cx="256" cy="364" rx="14" ry="5" fill="#60a5fa" opacity="0.6"/>
  <ellipse cx="335" cy="358" rx="11" ry="5" fill="#60a5fa" opacity="0.5"/>

  <!-- Point lumineux sommet -->
  <circle cx="256" cy="128" r="6" fill="#a3e635" opacity="0.9"/>
</svg>
